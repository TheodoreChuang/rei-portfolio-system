<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=1280" />
<title>Folio — Settings</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT@9..144,300..700,30..100&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="folio.css" />
</head>
<!--
  Folio — Settings screen
  ─────────────────────────────────────────────────────────────────
  Maps to Next.js route:  /settings
  Shared shell:           sidebar.js (injects <aside class="sidebar">)
                          folio.css  (all design tokens + components)
                          folio.js   (tabs, collapsibles, in-page state)
  Screens linked from here use ordinary <a href="X.html"> patterns;
  in the Next.js port these become <Link href="/X">.
-->
<body data-page="settings">
<div class="app">

  <!-- Sidebar is injected here by sidebar.js -->

  <main class="main">
    <div class="main-inner">

    <section class="screen is-active" data-screen="settings" data-screen-label="Settings">

      <div class="page-head">
        <div>
          <h1 class="title">Settings</h1>
          <p class="subtitle">Admin areas that don't change often. Most live here so they stay out of your way.</p>
        </div>
      </div>

      <div class="stack-7">

        <div>
          <div class="section-label">Portfolio configuration</div>
          <div class="settings-grid">

            <button type="button" class="settings-card" data-goto="entities">
              <span class="ico">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2.5" y="3" width="6" height="6" rx="0.6"/><rect x="9.5" y="3" width="6" height="6" rx="0.6"/><rect x="6" y="10" width="6" height="6" rx="0.6"/></svg>
              </span>
              <div class="body">
                <div class="title">Entities</div>
                <div class="desc">Trusts, companies, and individuals that own property in Folio. Rarely changed — typically when a structure changes.</div>
                <div class="preview">
                  <span class="pill">3 active</span>
                  <span class="pill">1 archived</span>
                  <span>Last edit · 4 months ago</span>
                </div>
              </div>
              <span class="chev">›</span>
            </button>

            <button type="button" class="settings-card is-disabled">
              <span class="ico">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><circle cx="6.5" cy="6.5" r="2.5"/><path d="M2 14.5a4.5 4.5 0 0 1 9 0"/><circle cx="13" cy="6.5" r="2"/><path d="M11.5 14.5a4 4 0 0 1 4.5-3.4"/></svg>
              </span>
              <div class="body">
                <div class="title">Members &amp; access <span class="coming-soon">Soon</span></div>
                <div class="desc">Invite an accountant, broker, or partner to view your portfolio. Permissions are read-only by default.</div>
                <div class="preview">
                  <span class="pill">Just you</span>
                </div>
              </div>
              <span class="chev" style="opacity: 0.3;">›</span>
            </button>

            <button type="button" class="settings-card is-disabled">
              <span class="ico">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M9 2v9M6 8l3 3 3-3"/><rect x="3" y="13" width="12" height="3" rx="0.6"/></svg>
              </span>
              <div class="body">
                <div class="title">Imports &amp; integrations <span class="coming-soon">Soon</span></div>
                <div class="desc">Direct feeds from banks &amp; managing agents so you don't have to upload PDFs. CBA and McGrath available today.</div>
                <div class="preview">
                  <span class="pill">2 connected</span>
                  <span>CBA · McGrath PM</span>
                </div>
              </div>
              <span class="chev" style="opacity: 0.3;">›</span>
            </button>

            <button type="button" class="settings-card is-disabled">
              <span class="ico">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 5h12M3 9h12M3 13h8"/><path d="M14 11l2 2-2 2"/></svg>
              </span>
              <div class="body">
                <div class="title">Tax &amp; financial year <span class="coming-soon">Soon</span></div>
                <div class="desc">Set your financial year (Jul–Jun by default), depreciation method, and how Folio rounds.</div>
                <div class="preview">
                  <span class="pill">FY · Jul–Jun</span>
                  <span class="pill">AUD</span>
                </div>
              </div>
              <span class="chev" style="opacity: 0.3;">›</span>
            </button>

          </div>
        </div>

        <div>
          <div class="section-label">Workspace</div>
          <div class="settings-grid">

            <button type="button" class="settings-card is-disabled">
              <span class="ico">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><path d="M3 4h12v8H3z"/><path d="M3 6l6 4 6-4"/></svg>
              </span>
              <div class="body">
                <div class="title">Notifications <span class="coming-soon">Soon</span></div>
                <div class="desc">When Folio emails you. Prompts, missing statements, IO rollover warnings, monthly digests.</div>
                <div class="preview">
                  <span>Email · weekly digest</span>
                </div>
              </div>
              <span class="chev" style="opacity: 0.3;">›</span>
            </button>

            <button type="button" class="settings-card is-disabled">
              <span class="ico">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="2" y="6" width="14" height="9" rx="1"/><path d="M2 9h14"/><path d="M6 12h2"/></svg>
              </span>
              <div class="body">
                <div class="title">Plan &amp; billing <span class="coming-soon">Soon</span></div>
                <div class="desc">You're on the Beta plan while Folio is in early access. Free until June 2026.</div>
                <div class="preview">
                  <span class="pill">Beta · free</span>
                </div>
              </div>
              <span class="chev" style="opacity: 0.3;">›</span>
            </button>

          </div>
        </div>

        <div>
          <div class="section-label">Account</div>
          <div class="settings-account">
            <div class="who">
              <div class="avatar">TO</div>
              <div>
                <div class="name">Theo Okafor</div>
                <div class="email">theo.okafor@example.com</div>
              </div>
            </div>
            <div class="actions">
              <button class="btn btn--ghost btn--sm">Change password</button>
              <button class="btn btn--ghost btn--sm">Export data</button>
              <button class="btn btn--secondary btn--sm" onclick="window.location.href='landing.html'">Sign out</button>
            </div>
          </div>
        </div>

      </div>
    </section>

    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script src="folio.js"></script>
</body>
</html>
