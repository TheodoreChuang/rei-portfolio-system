name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Lint, type-check, and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Unit tests
        run: pnpm test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Free ports used by Supabase
        run: sudo systemctl stop postgresql || true

      - name: Start local Supabase
        run: supabase start

      - name: Capture Supabase credentials
        id: supabase
        run: |
          STATUS=$(supabase status --output json)
          echo "anon_key=$(echo $STATUS | jq -r '.ANON_KEY')" >> $GITHUB_OUTPUT
          echo "api_url=$(echo $STATUS | jq -r '.API_URL')" >> $GITHUB_OUTPUT
          echo "service_role_key=$(echo $STATUS | jq -r '.SERVICE_ROLE_KEY')" >> $GITHUB_OUTPUT

      - name: Run migrations
        run: pnpm db:migrate
        env:
          DATABASE_URL_DIRECT: postgresql://postgres:postgres@localhost:54322/postgres

      - name: Create CI test user
        run: |
          curl -sf -X POST \
            "${{ steps.supabase.outputs.api_url }}/auth/v1/admin/users" \
            -H "Authorization: Bearer ${{ steps.supabase.outputs.service_role_key }}" \
            -H "Content-Type: application/json" \
            -d '{"email":"ci@test.local","password":"ci-password-folio","email_confirm":true}'

      - name: Integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase.outputs.anon_key }}
          TEST_USER_EMAIL: ci@test.local
          TEST_USER_PASSWORD: ci-password-folio

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build app for e2e
        run: pnpm build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase.outputs.anon_key }}

      - name: E2E tests
        run: pnpm test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:54322/postgres
          NEXT_PUBLIC_SUPABASE_URL: ${{ steps.supabase.outputs.api_url }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ steps.supabase.outputs.anon_key }}
          SUPABASE_SECRET_KEY: ${{ steps.supabase.outputs.service_role_key }}

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
